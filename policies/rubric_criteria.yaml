# Критерии рубрики гейта 04. Первые 6 — из методологии
# ~/Projects/archive/skill_eval_dlq.ipynb (официальный чеклист Anthropic по
# авторингу скиллов). groundedness — добавлен для этого проекта, ловит
# галлюцинации/непроверяемые утверждения.
conciseness: "Добавляет только то, чего модель не знает; нет воды и очевидных объяснений."
description_quality: "description говорит И что скилл делает, И когда применять; конкретные триггеры."
degrees_of_freedom: "Детализация соответствует хрупкости: жёсткие шаги где нельзя ошибаться, свобода где путей много."
concrete_examples: "Примеры конкретные (команды, поля, форматы записей), а не абстрактные."
consistent_terminology: "Один термин на одно понятие по всему тексту."
actionable_workflow: "Шаги чёткие, последовательные, с проверками и доказательствами."
groundedness: "Утверждения либо проверяемы, либо явно помечены как непроверенные; скилл не инструктирует модель придумывать факт вместо того, чтобы его проверить."
