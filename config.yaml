# Порядок гейтов = порядок прогона. Прогон последовательный: первый fail
# останавливает проверку скилла, гейты ниже по списку не запускаются.
gates:
  - id: 01_static
    module: gates.g01_static
    enabled: true
  - id: 02_permissions
    module: gates.g02_permissions
    enabled: true
  - id: 08_file_refs
    module: gates.g08_file_refs
    enabled: true
  - id: 03_duplication
    module: gates.g03_duplication
    enabled: true
  - id: 04_rubric
    module: gates.g04_rubric
    enabled: true
  - id: 05_token_efficiency
    module: gates.g05_token_efficiency
    enabled: true
  - id: 06_redteam
    module: gates.g06_redteam
    enabled: true

paths:
  skills_dir: examples/skills      # какие скиллы проверять
  registry_dir: examples/skills    # с чем сравнивать на дубли (в проде — весь реестр)
  # external_state_root: examples/external_state  # гейт 08: корень для ссылок
  # "прочитай <путь>"/"read <путь>" вне skills_dir (шаблоны, конфиги общей
  # базы знаний). Не задано по умолчанию — конвенция новая, гейт 08 SKIPPED,
  # пока путь явно не сконфигурирован под конкретную целевую систему.

# Пути к файлам политик (policies/*.yaml) не конфигурируются — они
# фиксированы в гейтах (02: tools_allowlist, 04: rubric_criteria,
# 06: redteam_attacks). Секции 'policies' здесь сознательно нет: раньше она
# была, но её не читал ни один гейт — ручка, которая обещает и не делает.

judge:
  model: claude-sonnet-5   # можно переопределить env JUDGE_MODEL
  n_runs: 8                # прогонов для оценки стабильности (sigma)

thresholds:
  duplication_similarity: 0.85     # выше — считается дублем (v0, Jaccard по словам)
  duplication_semantic_prefilter: 0.05  # v1: ниже — пара даже не идёт к judge (контроль стоимости на O(N^2))
  duplication_semantic_similarity: 0.8  # v1: judge-оценка similarity выше — считается функциональным дублем
  rubric_min_score: 0.7            # средний балл по рубрике ниже — fail
  rubric_max_sigma: 0.02           # нестабильность overall-балла выше — fail (откалибровано в ноутбуке-первоисточнике для среднего по критериям)
  rubric_max_criterion_sigma: 0.05 # sigma отдельного критерия выше — fail (не откалибровано: у одного критерия дисперсия заведомо выше, чем у среднего по ~7, порог 0.02 сюда переносить нельзя)
  rubric_drift_warn_abs: 0.1       # |mean - предыдущий mean той же связки skill+model+backend| выше — non-blocking предупреждение, не fail
  token_efficiency_max_overhead_pct: 30       # overhead ниже — PASS без проверки coverage
  token_efficiency_min_coverage_gain_pp: 10   # overhead выше порога — нужен прирост coverage не меньше этого, иначе fail
  chain_io_compat_min_score: 0.6   # гейт 07: judge-оценка совместимости provides:/ожиданий A ниже — fail (не откалибровано)
  chain_token_budget_max: 8000     # гейт 07: сумма input-токенов A + транзитивных uses: выше — fail (не откалибровано)
