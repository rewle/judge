# Поведенческий тест для гейта 05. Задача намеренно тривиальна — модель
# должна справляться с ней одинаково хорошо с/без скилла, поэтому весь
# лишний overhead токенов от раздутого тела скилла не должен окупаться
# приростом coverage (см. docs/05_token_efficiency.md и фикстуру целиком).
query: >
  В приложенном CSV есть колонки: имя_клиента, дата_заказа, сумма_руб.
  Нужно переименовать их в: customer_name, order_date, amount_rub.
  Дай итоговую строку заголовка и опиши шаги.
input: |
  CSV (первая строка — текущие заголовки):
  имя_клиента,дата_заказа,сумма_руб
  Иванов И.И.,2026-05-01,1200
expected_behavior:
  - "Определяет соответствие каждой старой колонки новой по словарю"
  - "Выдаёт итоговую строку заголовка ровно с тремя новыми именами в правильном порядке"
  - "Не меняет сами данные строк, только заголовок"
